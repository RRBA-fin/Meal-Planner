<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Viikkolista – ruokalistat ja ostoslista</title>
<meta name="description" content="Arvo viikon ruokalista kaloritavoitteen mukaan ja koosta ostoslista.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDF1EC; --card:#FFFFFF; --ink:#22302A; --muted:#5F6F66; --line:#DDE4DC;
  --pine:#2F6B4F; --pine-deep:#24523D; --pine-soft:#E3EEE7;
  --berry:#B23A5A; --berry-soft:#F6E7EC;
  --over:#C63D3D; --intol:#3E5FA0; --under:#2F8B4F;
  --r:14px; --shadow:0 1px 3px rgba(34,48,42,.08);
  --h1:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Instrument Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
button:focus-visible,input:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
.wrap{max-width:560px;margin:0 auto;padding:0 14px}
.num{font-variant-numeric:tabular-nums}
.kc-over{color:var(--over)!important}.kc-intol{color:var(--intol)!important}.kc-under{color:var(--under)!important}

header{position:sticky;top:0;z-index:20;background:var(--pine-deep);color:#F2F6F1;padding-top:env(safe-area-inset-top)}
.hrow{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:12px 14px}
.brand{font-family:var(--h1);font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand small{display:block;font-family:var(--body);font-weight:400;font-size:11.5px;opacity:.75}
.hbtn{margin-left:auto;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.hbtn:active{background:rgba(255,255,255,.22)}

nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--card);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabs{max-width:560px;margin:0 auto;display:flex}
.tab{flex:1;padding:9px 0 8px;text-align:center;font-size:11.5px;color:var(--muted);font-weight:500}
.tab .ti{display:block;font-size:19px;line-height:1.25}
.tab.on{color:var(--pine-deep);font-weight:600}

main{padding:16px 0 24px}
h2.sec{font-family:var(--h1);font-weight:700;font-size:17px;margin:4px 0 10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;
  border-radius:12px;padding:12px 18px;background:var(--pine);color:#fff}
.btn:active{background:var(--pine-deep)}
.btn.ghost{background:var(--pine-soft);color:var(--pine-deep)}
.btn.small{padding:8px 12px;font-size:13.5px;border-radius:10px}
.btn.wide{width:100%}

.weekbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.weekbar h2{font-family:var(--h1);font-weight:800;font-size:22px;letter-spacing:-.02em}
.weekbar .sub{font-size:12.5px;color:var(--muted)}
.weekbar .btn{margin-left:auto;flex:none}
.hint{background:var(--berry-soft);color:var(--berry);font-size:13px;border-radius:10px;padding:9px 12px;margin-bottom:12px}
.hint.info{background:var(--pine-soft);color:var(--pine-deep)}

.day{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.dhead{display:flex;align-items:baseline;gap:8px;padding:10px 14px 6px}
.dname{font-family:var(--h1);font-weight:700;font-size:15.5px}
.dname.today{color:var(--pine)}
.dsum{margin-left:auto;font-size:11.5px;color:var(--muted);text-align:right}
.dsum .tot{font-weight:700;font-size:12.5px}
.meal{display:flex;align-items:center;gap:8px;padding:9px 12px 9px 0;margin-left:14px;border-top:1px solid var(--line)}
.rail{width:4px;align-self:stretch;border-radius:4px;flex:none}
.meal .mt{flex:1;min-width:0;text-align:left}
.mlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.mname{font-weight:600;font-size:14.5px;line-height:1.3}
.mmeta{font-size:11.5px;color:var(--muted)}
.mmeta b{color:var(--berry);font-weight:600}
.mmeta .kcal{font-weight:600}
.pill{flex:none;font-size:10.5px;font-weight:600;color:var(--pine-deep);background:var(--pine-soft);border-radius:99px;padding:3px 8px}
.icb{flex:none;width:32px;height:32px;border-radius:10px;background:var(--bg);font-size:14px;color:var(--muted)}
.icb:active{background:var(--pine-soft);color:var(--pine-deep)}

.snackrow{border-top:1px dashed var(--line);margin-left:14px;padding:8px 12px 8px 0}
.addsnack{width:100%;text-align:left;color:var(--muted);font-size:13.5px;padding:4px 0;display:flex;align-items:center;gap:8px}
.addsnack .plus{width:22px;height:22px;border-radius:7px;border:1.5px dashed var(--muted);display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.snackset{display:flex;align-items:center;gap:10px}
.snackset .mt{flex:1;min-width:0;text-align:left}

.empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--r);padding:34px 20px;text-align:center;margin-top:8vh}
.empty .big{font-family:var(--h1);font-weight:800;font-size:24px;letter-spacing:-.02em;margin-bottom:8px}
.empty p{color:var(--muted);margin-bottom:18px}

.shopcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:6px 14px;margin-bottom:12px}
.shoprow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.shoprow:last-child{border-bottom:0}
.shoprow input{width:21px;height:21px;accent-color:var(--pine);flex:none}
.shoprow label{flex:1;min-width:0}
.shoprow .qty{font-weight:600;margin-right:6px}
.shoprow.done label{color:var(--muted);text-decoration:line-through}
.shopopts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.chk{display:flex;align-items:center;gap:10px;font-size:14px}
.chk input{width:19px;height:19px;accent-color:var(--pine)}
details.pantry{margin:4px 0 14px}
details.pantry summary{font-size:13.5px;color:var(--muted);font-weight:600;cursor:pointer;padding:6px 2px}
details.pantry .plist{font-size:13.5px;color:var(--muted);padding:4px 2px 2px;line-height:1.7}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1.5px solid var(--line);background:var(--card);border-radius:99px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{border-color:var(--pine);background:var(--pine-soft);color:var(--pine-deep)}
.catgrp{margin-bottom:16px}
.rrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;width:100%;text-align:left}
.rrow .mt{flex:1;min-width:0}
.tagline{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.tg{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:var(--bg);color:var(--muted);border-radius:5px;padding:2px 6px}
.tg.b{background:var(--berry-soft);color:var(--berry)}
.proj{flex:none;text-align:right;font-size:11.5px;font-weight:700}
.proj small{display:block;font-weight:400;color:var(--muted);font-size:10px}

.scrim{position:fixed;inset:0;background:rgba(24,34,29,.45);z-index:40;display:none}
.scrim.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--card);border-radius:18px 18px 0 0;max-height:86vh;overflow:auto;display:none;
  padding:10px 18px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
.sheet.open{display:block}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:4px auto 12px}
.sheet h3{font-family:var(--h1);font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:4px}
.sheet .sub{color:var(--muted);font-size:13px;margin-bottom:12px}
.sheet h4{font-family:var(--h1);font-size:14.5px;margin:16px 0 6px}
.ing li,.stp li{margin:0 0 6px 18px}
.stp li{margin-bottom:9px}
.huom{background:var(--pine-soft);color:var(--pine-deep);font-size:13px;border-radius:10px;padding:9px 12px;margin-top:12px}
.setrow{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.setrow:last-of-type{border-bottom:0}
.setrow .lbl{flex:1;min-width:150px}
.setrow .lbl small{display:block;color:var(--muted);font-size:12px}
.step{display:flex;align-items:center;gap:2px;background:var(--bg);border-radius:10px;padding:3px}
.step button{width:34px;height:32px;border-radius:8px;font-size:17px;font-weight:600}
.step .v{min-width:30px;text-align:center;font-weight:700}
.seg{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;flex-wrap:wrap}
.seg button{padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--card);color:var(--pine-deep);box-shadow:var(--shadow)}
.danger{color:var(--berry);font-weight:600;font-size:13.5px;padding:12px 0}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted);margin:8px 0 12px;flex-wrap:wrap}
.legend i{font-style:normal;font-weight:700}

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));
  background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;border-radius:99px;padding:9px 16px;
  z-index:60;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}
.err{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-top:20px;line-height:1.6}
.err code{background:var(--bg);border-radius:6px;padding:2px 6px;font-size:13px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="brand">Viikkolista<small id="weekLabel"></small></div>
    <button class="hbtn" id="btnSettings" aria-label="Asetukset">⚙︎</button>
  </div>
</header>

<main class="wrap">
  <section id="viewWeek"></section>
  <section id="viewShop" hidden></section>
  <section id="viewBank" hidden></section>
</main>

<nav>
  <div class="tabs">
    <button class="tab on" data-view="Week"><span class="ti">🗓️</span>Viikko</button>
    <button class="tab" data-view="Shop"><span class="ti">🛒</span>Ostoslista</button>
    <button class="tab" data-view="Bank"><span class="ti">🍲</span>Reseptit</button>
  </div>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheetRecipe"></div>
<div class="sheet" id="sheetPick"></div>
<div class="sheet" id="sheetSettings"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================ State ============================ */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem('vl_'+k); return v?JSON.parse(v):d }catch(e){ return d } },
  set(k,v){ try{ localStorage.setItem('vl_'+k, JSON.stringify(v)) }catch(e){} }
};
let RECIPES = [];
let settings = Object.assign({ persons:2, mainsMode:'sama', filters:[], kcalTarget:2000, redMeat:'salli' }, LS.get('settings', {}));
let week     = LS.get('week', null);
if(week && week.v!==2) week=null;                 // old data format -> fresh start
let history_ = LS.get('history', {});             // main-course rotation memory
let checked  = LS.get('checked', {});
const DAYS = ['Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai','Sunnuntai'];
const DAYS_S = ['Ma','Ti','Ke','To','Pe','La','Su'];
const CATS = { aamupala:'Aamupala', lounas:'Lounas', paivallinen:'Päivällinen', iltapala:'Iltapala', valipala:'Välipala' };
const HUES = ['#2F6B4F','#B23A5A','#3E5FA0','#B07B2E','#6C4FA0','#2E8B8B'];
const ROTATION_DAYS = 28, TOL = 300;

/* ============================ Boot ============================ */
init();
async function init(){
  try{
    const res = await fetch('recipes.json');
    if(!res.ok) throw new Error(res.status);
    RECIPES = (await res.json()).recipes;
  }catch(e){
    document.getElementById('viewWeek').innerHTML =
      `<div class="err"><b>Reseptejä ei saatu ladattua.</b><br>
       Avaa sivu palvelimen kautta (esim. GitHub Pages) tai käynnistä paikallinen palvelin kansiossa:
       <br><code>python3 -m http.server</code> ja avaa <code>http://localhost:8000</code>.</div>`;
    return;
  }
  bindNav();
  renderAll();
}

/* ============================ Helpers ============================ */
const byId = id => RECIPES.find(r=>r.id===id);
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rm = r => r.redMeat||0;
/* portion scaling: the calorie target scales portion sizes.
   REF is the natural day-center of the recipe pool — scaling from it keeps the
   target reachable from both sides so the weekly average lands on target. */
const REF=1750;
function PF(){ return settings.kcalTarget/REF }
const kc = r => Math.round(r.kcal*PF());
const pr = r => Math.round(r.protein*PF());
function matchFilters(r){
  if(!settings.filters.every(f=>r.tags.includes(f))) return false;
  if(settings.redMeat==='ei' && rm(r)>=1) return false;
  return true;
}
function pool(cat){ return RECIPES.filter(r=>r.categories.includes(cat) && matchFilters(r)) }
function mainsPool(){ return RECIPES.filter(r=>(r.categories.includes('lounas')||r.categories.includes('paivallinen')) && matchFilters(r)) }
function recentlyUsed(id){
  const d=history_[id]; if(!d) return false;
  return (Date.now()-new Date(d).getTime())/864e5 < ROTATION_DAYS;
}
const TREAT=/pitsa|pizza|tacot|burger|fajitas|wrapit|tortilla|kiusaus|hampurilais|grilli/i;
const isTreat = r => TREAT.test(r.id)||TREAT.test(r.name);
function weightedPick(cands, ideal, wFn){
  const list=cands;
  const ws=list.map(r=>Math.exp(-Math.pow((kc(r)-ideal)/(170*PF()),2))*(wFn?wFn(r):1));
  let s=ws.reduce((a,b)=>a+b,0)*Math.random();
  for(let i=0;i<list.length;i++){ s-=ws[i]; if(s<=0) return list[i] }
  return list[list.length-1];
}
function chunkPattern(){ const p=[[3,2,2],[2,3,2],[2,2,3]]; return p[Math.floor(Math.random()*3)] }
function weekNumber(dt){
  const d=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));
  const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
  const y0=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil(((d-y0)/864e5+1)/7);
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800);
}
function fmtQty(q){ return (Math.round(q*100)/100).toString().replace('.',',') }
function fmtK(n){ return Math.round(n).toLocaleString('fi-FI') }
function kcStatus(total){
  const T=settings.kcalTarget;
  if(total>T+TOL) return 'over';
  if(total<T-TOL) return 'under';
  return 'intol';
}
const KC_TXT={over:'yli tavoitteen',intol:'tavoitteessa',under:'alle tavoitteen'};

/* ============================ Week generation ============================ */
function poolRange(cat){
  const p=pool(cat);
  if(!p.length) return {min:0,max:0};
  const ks=p.map(kc);
  return {min:Math.min(...ks),max:Math.max(...ks)};
}
function pickOneMain(source, state, lo, hi, weekend){
  // filter: no duplicates, red-meat budget, feasibility window, rotation freshness — relaxing in that order
  let cands=source.filter(r=>!state.used.includes(r.id));
  if(!cands.length) cands=source;
  if(settings.redMeat==='vahan'){
    const c2=cands.filter(r=>rm(r)<2||state.rm2<1);
    if(c2.length) cands=c2;
  }
  const inWin=cands.filter(r=>kc(r)>=lo&&kc(r)<=hi);
  const winDist=r=>kc(r)<lo?lo-kc(r):kc(r)>hi?kc(r)-hi:0;
  let base=inWin.length?inWin:cands.slice().sort((a,b)=>winDist(a)-winDist(b)).slice(0,Math.max(3,Math.min(6,cands.length)));
  const fresh=base.filter(r=>!recentlyUsed(r.id));
  // weekend chunks aim heavier + favor treat food and allow longer prep; weekdays favor quick recipes
  const ideal=Math.min(hi,Math.max(lo,settings.kcalTarget*(weekend?0.33:0.29)));
  const wFn=weekend
    ? r=>(isTreat(r)?2.5:1)
    : r=>(r.prepMinutes>35?0.55:1)*(isTreat(r)?0.5:1);
  const p=weightedPick(fresh.length?fresh:base, ideal, wFn);
  state.used.push(p.id); if(rm(p)===2) state.rm2++;
  return p;
}
function planDayKcal(plan,d){
  let k=0;
  const add=id=>{const r=byId(id); if(r)k+=kc(r)};
  add(plan.aamupala[d].recipeId);
  ['lounas','paivallinen'].forEach(mk=>{
    const c=plan[mk].find(c=>c.days.includes(d)); if(c) add(c.recipeId);
  });
  add(plan.iltapala[d].recipeId);
  return k;
}
function generateWeek(){
  // retry a few times and keep the attempt with fewest days outside the tolerance band
  let best=null;
  for(let a=0;a<4;a++){
    const cand=generateWeekOnce();
    let off=0;
    for(let d=0;d<7;d++) if(Math.abs(planDayKcal(cand.plan,d)-settings.kcalTarget)>TOL) off++;
    if(!best||off<best.off) best={...cand,off};
    if(best.off===0) break;
  }
  best.used.forEach(id=>history_[id]=new Date().toISOString());
  LS.set('history',history_);
  week={ v:2, id:Date.now(), created:new Date().toISOString(), plan:best.plan, snacks:{}, snacksToList:true, manual:{} };
  checked={}; LS.set('checked',checked);
  LS.set('week',week);
}
function generateWeekOnce(){
  const plan={};
  const T=settings.kcalTarget;
  const bR=poolRange('aamupala'), iR=poolRange('iltapala');
  // two-sided window: the day must be able to land on BOTH sides of the target,
  // otherwise weekly totals drift low/high with no way to compensate
  const Mlo=T-bR.max-iR.max, Mhi=T-bR.min-iR.min;
  const state={used:[],rm2:0};
  if(settings.mainsMode==='sama'){
    const pm=chunkPattern();
    let d=0;
    plan.lounas=pm.map((len,ci)=>{
      const r=pickOneMain(mainsPool(), state, Mlo/2, Mhi/2, ci===pm.length-1);
      const days=[];for(let k=0;k<len;k++)days.push(d++);
      return {recipeId:r.id,days,hue:HUES[(2+ci)%6]};
    });
    plan.paivallinen=plan.lounas.map(c=>({...c,days:[...c.days]}));
    plan._shared=true;
  }else{
    const pl=chunkPattern(), pd=chunkPattern();
    const dinR=poolRange('paivallinen');
    let d=0;
    plan.lounas=pl.map((len,ci)=>{
      const r=pickOneMain(pool('lounas'), state, Mlo-dinR.max, Mhi-dinR.min, ci===pl.length-1);
      const days=[];for(let k=0;k<len;k++)days.push(d++);
      return {recipeId:r.id,days,hue:HUES[(2+ci)%6]};
    });
    const lunchK=day=>{const c=plan.lounas.find(c=>c.days.includes(day));return kc(byId(c.recipeId))};
    d=0;
    plan.paivallinen=pd.map((len,ci)=>{
      const days=[];for(let k=0;k<len;k++)days.push(d++);
      const lks=days.map(lunchK);
      const r=pickOneMain(pool('paivallinen'), state, Mlo-Math.min(...lks), Mhi-Math.max(...lks), ci===pd.length-1);
      return {recipeId:r.id,days,hue:HUES[(4+ci)%6]};
    });
    plan._shared=false;
  }
  // daily breakfasts & evening snacks fitted to the calorie target (no rotation memory)
  plan.aamupala=[]; plan.iltapala=[];
  let carry=0; // weekly balance: deficit/surplus so far steers the next day's aim
  for(let d=0;d<7;d++){
    const m=mainsKcalOfDay(plan,d);
    const aim=T+Math.max(-TOL,Math.min(TOL,carry));
    const [b,i]=fitDay(m,aim);
    plan.aamupala.push({recipeId:b.id});
    plan.iltapala.push({recipeId:i.id});
    carry+=T-(m+kc(b)+kc(i));
  }
  return {plan, used:state.used};
}
function mainsKcalOfDay(plan,d){
  let k=0;
  ['lounas','paivallinen'].forEach(mk=>{
    const c=plan[mk].find(c=>c.days.includes(d));
    if(c){const r=byId(c.recipeId); if(r)k+=kc(r)}
  });
  return k;
}
function fitDay(mainsKcal,aim){
  const T=settings.kcalTarget;
  aim=aim==null?T:aim;
  const bs=pool('aamupala'), is=pool('iltapala');
  const combos=[];
  for(const b of bs) for(const i of is){
    const tot=mainsKcal+kc(b)+kc(i);
    combos.push({b,i,diff:Math.abs(tot-T),aimDiff:Math.abs(tot-aim)});
  }
  // hard rule: stay within T±TOL if possible; among those, prefer combos nearest the weekly-balance aim
  const ok=combos.filter(c=>c.diff<=TOL);
  const src=(ok.length?ok:combos).sort((a,b)=>a.aimDiff-b.aimDiff).slice(0,ok.length?12:3);
  const pick=src[Math.floor(Math.random()*src.length)];
  return [pick.b,pick.i];
}

/* ---- rerolls & manual picks ---- */
function dayTotal(d){
  let k=0,p=0;
  const add=r=>{ if(r){k+=kc(r);p+=pr(r)} };
  add(byId(week.plan.aamupala[d].recipeId));
  ['lounas','paivallinen'].forEach(mk=>{
    const c=week.plan[mk].find(c=>c.days.includes(d)); if(c) add(byId(c.recipeId));
  });
  add(byId(week.plan.iltapala[d].recipeId));
  if(week.snacks[d]) add(byId(week.snacks[d]));
  return {kcal:k,protein:p};
}
function rerollDaily(mk,d){
  const cur=week.plan[mk][d].recipeId;
  const others=pool(mk).filter(r=>r.id!==cur);
  if(!others.length){ toast('Ei vaihtoehtoja tällä suodatuksella'); return }
  const base=dayTotal(d).kcal - kc(byId(cur));
  const ok=others.filter(r=>Math.abs(base+kc(r)-settings.kcalTarget)<=TOL);
  const src=ok.length?ok:others;
  const pick=src[Math.floor(Math.random()*src.length)];
  week.plan[mk][d]={recipeId:pick.id};
  delete week.manual[mk+d];
  LS.set('week',week); renderAll(); toast('Vaihdettu: '+pick.name);
}
function rerollChunk(mk,ci){
  const inWeek=[]; ['lounas','paivallinen'].forEach(k=>week.plan[k].forEach(c=>inWeek.push(c.recipeId)));
  const cands=(week.plan._shared?mainsPool():pool(mk)).filter(r=>!inWeek.includes(r.id));
  if(!cands.length){ toast('Ei vaihtoehtoja tällä suodatuksella'); return }
  const c=week.plan[mk][ci];
  const weekend=c.days.includes(5)||c.days.includes(6);
  const T=settings.kcalTarget;
  const ideal=T*(weekend?0.33:0.29);
  const wFn=weekend ? r=>(isTreat(r)?2.5:1) : r=>(r.prepMinutes>35?0.55:1)*(isTreat(r)?0.5:1);
  const fresh=cands.filter(r=>!recentlyUsed(r.id));
  const pick=weightedPick(fresh.length?fresh:cands, ideal, wFn);
  applyMainPick(mk,ci,pick,false);
  toast('Vaihdettu: '+pick.name);
}
function applyMainPick(mk,ci,pick,manual){
  week.plan[mk][ci].recipeId=pick.id;
  if(week.plan._shared){
    const other=mk==='lounas'?'paivallinen':'lounas';
    week.plan[other][ci].recipeId=pick.id;
  }
  if(manual) week.manual[mk+ci+'c']=true;
  history_[pick.id]=new Date().toISOString(); LS.set('history',history_);
  LS.set('week',week); renderAll();
}

/* ============================ Scaling & shopping ============================ */
function chunkServingsNeeded(mk,c){
  const mult=(week.plan._shared&&(mk==='lounas'||mk==='paivallinen'))?2:1;
  return settings.persons*c.days.length*mult;
}
function niceQty(q,unit){
  const u=(unit||'').toLowerCase();
  if(!q) return q;
  if(u.startsWith('g')) return Math.max(10,Math.round(q/10)*10);
  if(u==='kg') return Math.round(q*10)/10;
  if(/^(dl|l|rkl|tl)/.test(u)) return Math.round(q*2)/2;
  if(/(kpl|prk|pss|plo|rasia|ker|iso|siivu|viipale|kourallinen)/.test(u)) return Math.ceil(q);
  return Math.round(q*10)/10;
}
function buildShopping(){
  const map=new Map(), pantry=new Set();
  const add=(ing,mult)=>{
    if(ing.pantry){ pantry.add(ing.name); return }
    const key=ing.name+'|'+(ing.unit||'');
    if(ing.qty==null){ if(!map.has(key)) map.set(key,{name:ing.name,unit:ing.unit||'',qty:null}); return }
    const cur=map.get(key)||{name:ing.name,unit:ing.unit||'',qty:0};
    cur.qty+=ing.qty*mult; map.set(key,cur);
  };
  ['lounas','paivallinen'].forEach(mk=>{
    if(week.plan._shared&&mk==='paivallinen') return;
    week.plan[mk].forEach(c=>{
      const r=byId(c.recipeId); if(!r) return;
      r.ingredients.forEach(i=>add(i, chunkServingsNeeded(mk,c)*PF()/r.servings));
    });
  });
  ['aamupala','iltapala'].forEach(mk=>{
    week.plan[mk].forEach(e=>{
      const r=byId(e.recipeId); if(!r) return;
      r.ingredients.forEach(i=>add(i, settings.persons*PF()/r.servings));
    });
  });
  if(week.snacksToList){
    Object.values(week.snacks).forEach(sid=>{
      const r=byId(sid); if(!r) return;
      r.ingredients.forEach(i=>add(i, settings.persons*PF()/r.servings));
    });
  }
  const items=[...map.values()].map(it=>({...it,qty:it.qty==null?null:niceQty(it.qty,it.unit)}))
    .sort((a,b)=>a.name.localeCompare(b.name,'fi'));
  return { items, pantry:[...pantry].sort((a,b)=>a.localeCompare(b,'fi')) };
}

  return `<div class="meal">
    <span class="rail" style="background:${hue||'#CBD5CC'}"></span>

    <button class="icb" data-reroll="${btns.ctx}" aria-label="Arvo tilalle toinen">⟳</button>

function renderWeek(){
  const el=document.getElementById('viewWeek');
  if(!week){
    el.innerHTML=`<div class="empty">
      <div class="big">Arvotaan viikon safkat?</div>
      <p>Kone arpoo pääruuat 2–3 päivän satseina ja sovittaa aamu- ja iltapalat päivittäin kaloritavoitteeseesi (${fmtK(settings.kcalTarget)} kcal ± ${TOL}).</p>
      <button class="btn" id="btnGen">Arvo viikon lista</button></div>`;
    el.querySelector('#btnGen').onclick=()=>{ generateWeek(); renderAll(); };
    return;
  }
  const todayIdx=(new Date().getDay()+6)%7;
  let h=`<div class="weekbar"><div><h2>Viikon ruuat</h2>
     <div class="sub">${settings.persons} hlö · tavoite ${fmtK(settings.kcalTarget)} kcal/pv · ${week.plan._shared?'sama satsi lounaaksi ja päivälliseksi':'omat ruuat lounaalle ja päivälliselle'}</div></div>
     <button class="btn small ghost" id="btnRegen">↻ Arvo uusiksi</button></div>
     <div class="legend"><i class="kc-under">● alle</i><i class="kc-intol">● tavoitteessa (±${TOL})</i><i class="kc-over">● yli</i></div>`;
  if(PF()!==1)
    h+=`<div class="hint info">Annoskoot ja ostoslista on skaalattu kertoimella ×${fmtQty(PF())} kaloritavoitteen mukaan — lautasmalli reseptikortin lopussa näyttää annoksen koon.</div>`;
  for(let d=0;d<7;d++){
    let rows='';
    // breakfast (daily)
    const bR=byId(week.plan.aamupala[d].recipeId);
    rows+=mealRow({label:'Aamupala',r:bR,hue:null,pill:null,btns:{ctx:'aamupala:'+d},manualKey:'aamupala'+d,day:d});
    // mains (chunks)
    ['lounas','paivallinen'].forEach(mk=>{
      if(week.plan._shared&&mk==='paivallinen') return;
      const ci=week.plan[mk].findIndex(c=>c.days.includes(d)); if(ci<0) return;
      const c=week.plan[mk][ci], r=byId(c.recipeId);
      const label=week.plan._shared?'Lounas + päivällinen':CATS[mk];
      rows+=mealRow({label,r,hue:c.hue,pill:(c.days.indexOf(d)+1)+'/'+c.days.length,
        btns:{ctx:mk+'#'+ci},manualKey:mk+ci+'c',day:d});
    });
    // evening snack (daily)
    const iR=byId(week.plan.iltapala[d].recipeId);
    rows+=mealRow({label:'Iltapala',r:iR,hue:null,pill:null,btns:{ctx:'iltapala:'+d},manualKey:'iltapala'+d,day:d});
    // optional snack
    const sid=week.snacks[d];
    let snack;
    if(sid&&byId(sid)){
      const r=byId(sid);
      snack=`<div class="snackrow snackset">
        <button class="mt" data-open="${r.id}" data-ctx="valipala:${d}">
          <div class="mlabel">Välipala</div><div class="mname">${esc(r.name)}</div>
          <div class="mmeta num">≈ ${kc(r)} kcal · <b>${pr(r)} g prot.</b></div>
        </button>
        <button class="icb" data-unsnack="${d}" aria-label="Poista välipala">✕</button></div>`;
    }else{
      snack=`<div class="snackrow"><button class="addsnack" data-snack="${d}">
        <span class="plus">+</span> Lisää välipala</button></div>`;
    }
    const t=dayTotal(d), st=kcStatus(t.kcal);
    h+=`<article class="day"><div class="dhead">
      <span class="dname ${d===todayIdx?'today':''}">${DAYS[d]}${d===todayIdx?' · tänään':''}</span>
      <span class="dsum num"><span class="tot kc-${st}">≈ ${fmtK(t.kcal)} / ${fmtK(settings.kcalTarget)} kcal</span><br><b style="color:var(--berry)">${t.protein} g prot.</b></span>
      </div>${rows}${snack}</article>`;
  }
  el.innerHTML=h;
  el.querySelector('#btnRegen').onclick=()=>{
    if(confirm('Arvotaanko koko viikko uusiksi? Nykyinen lista ja ostoslistan ruksit nollataan.')){ generateWeek(); renderAll(); }
  };
  el.querySelectorAll('[data-reroll]').forEach(b=>b.onclick=e=>{
    e.stopPropagation(); routeCtx(b.dataset.reroll,(mk,d)=>rerollDaily(mk,d),(mk,ci)=>rerollChunk(mk,ci));
  });
  el.querySelectorAll('[data-pick]').forEach(b=>b.onclick=e=>{
    e.stopPropagation(); routeCtx(b.dataset.pick,(mk,d)=>openPickerDaily(mk,d),(mk,ci)=>openPickerChunk(mk,ci));
  });
  el.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openRecipe(b.dataset.open,b.dataset.ctx));
  el.querySelectorAll('[data-snack]').forEach(b=>b.onclick=()=>openPickerSnack(+b.dataset.snack));
  el.querySelectorAll('[data-unsnack]').forEach(b=>b.onclick=()=>{
    delete week.snacks[b.dataset.unsnack]; LS.set('week',week); renderAll();
  });
}
function routeCtx(ctx,dailyFn,chunkFn){
  if(ctx.includes('#')){ const [mk,ci]=ctx.split('#'); chunkFn(mk,+ci) }
  else{ const [mk,d]=ctx.split(':'); dailyFn(mk,+d) }
}

   ? `Sekoiteruoka: annostele ruokaa noin kaksi kolmasosaa lautasesta ja täytä loput kasviksilla tai salaatilla. Annos ≈ ${kc(r)} kcal.`
   : `Puolet kasviksia, neljännes proteiinia (${prot}) ja neljännes lisäkettä eli perunaa, riisiä tai pastaa (${carb} kypsänä). Annos ≈ ${kc(r)} kcal.`;
  return `<h4>Lautasmalli</h4>${svg}<p class="sub" style="margin-top:8px">${cap} Määrät ovat suuntaa-antavia — lautaskoot vaihtelevat.</p>`;
}

/* ----- Manual pickers ----- */
function pickerRows(cands, projFn, dataAttr){
  return cands.map(r=>{
    const t=projFn(r), st=kcStatus(t);
    return `<button class="rrow" ${dataAttr}="${r.id}">
      <div class="mt"><div class="mname">${esc(r.name)}</div>
      <div class="mmeta num">≈ ${kc(r)} kcal · <b>${pr(r)} g prot.</b> · ${r.prepMinutes} min</div></div>
      <span class="proj kc-${st} num">${fmtK(t)} kcal<small>päivä yht. · ${KC_TXT[st]}</small></span></button>`;
  }).join('')||'<p class="sub">Ei vaihtoehtoja tällä suodatuksella.</p>';
}
function openPickerDaily(mk,d){
  const sh=document.getElementById('sheetPick');
  const cur=week.plan[mk][d].recipeId;
  const base=dayTotal(d).kcal - kc(byId(cur));
  const cands=pool(mk).slice().sort((a,b)=>Math.abs(base+kc(a)-settings.kcalTarget)-Math.abs(base+kc(b)-settings.kcalTarget));
  sh.innerHTML=`<div class="grab"></div><h3>${CATS[mk]} · ${DAYS[d]}</h3>
    <div class="sub">Sopivimmat ensin. Väri kertoo mihin päivän kalorit asettuvat valinnalla (tavoite ${fmtK(settings.kcalTarget)} ± ${TOL} kcal).</div>`+
    pickerRows(cands, r=>base+kc(r), 'data-sel');
  sh.querySelectorAll('[data-sel]').forEach(b=>b.onclick=()=>{
    week.plan[mk][d]={recipeId:b.dataset.sel};
    week.manual[mk+d]=true;
    LS.set('week',week); closeSheets(); renderAll();
  });
  openSheet(sh);
}
function openPickerChunk(mk,ci){
  const sh=document.getElementById('sheetPick');
  const c=week.plan[mk][ci], cur=byId(c.recipeId);
  const factor=week.plan._shared?2:1;
  // projected: average day total across the chunk's days with the candidate swapped in
  const proj=r=>{
    let s=0;
    c.days.forEach(d=>{ s+=dayTotal(d).kcal-(kc(cur)*factor)+(kc(r)*factor) });
    return s/c.days.length;
  };
  const cands=(week.plan._shared?mainsPool():pool(mk)).slice()
    .sort((a,b)=>Math.abs(proj(a)-settings.kcalTarget)-Math.abs(proj(b)-settings.kcalTarget));
  sh.innerHTML=`<div class="grab"></div><h3>${week.plan._shared?'Lounas + päivällinen':CATS[mk]} · ${c.days.map(d=>DAYS_S[d]).join('–')}</h3>
    <div class="sub">Sopivimmat ensin. Väri kertoo satsin päivien keskimääräisen kalorikertymän valinnalla.</div>`+
    pickerRows(cands, proj, 'data-sel');
  sh.querySelectorAll('[data-sel]').forEach(b=>b.onclick=()=>{
    applyMainPick(mk,ci,byId(b.dataset.sel),true);
    week.manual[mk+ci+'c']=true; LS.set('week',week);
    closeSheets(); renderAll();
  });
  openSheet(sh);
}
function openPickerSnack(d){
  const sh=document.getElementById('sheetPick');
  const base=dayTotal(d).kcal;
  const cands=pool('valipala');
  sh.innerHTML=`<div class="grab"></div><h3>Välipala · ${DAYS[d]}</h3>
    <div class="sub">Väri kertoo mihin päivän kalorit asettuvat välipalan kanssa.</div>`+
    pickerRows(cands, r=>base+kc(r), 'data-sel');
  sh.querySelectorAll('[data-sel]').forEach(b=>b.onclick=()=>{
    week.snacks[d]=b.dataset.sel; LS.set('week',week); closeSheets(); renderAll();
  });
  openSheet(sh);
}

/* ----- Settings ----- */
let settingsOpen=false;
function openSettings(){ settingsOpen=true; renderSettings(); openSheet(document.getElementById('sheetSettings')) }
function renderSettingsIfOpen(){ if(settingsOpen) renderSettings() }
function renderSettings(){
  const sh=document.getElementById('sheetSettings');
  sh.innerHTML=`<div class="grab"></div><h3>Asetukset</h3>
  <div class="setrow"><div class="lbl">Kaloritavoite<small>Toleranssi ±${TOL} kcal/pv. Skaalaa annoskoot ja ostoslistan tavoitteeseen sopiviksi.</small></div>
    <div class="seg">${[1500,2000,2500,3000].map(k=>
      `<button data-kcal="${k}" class="${settings.kcalTarget===k?'on':''}">${fmtK(k)}</button>`).join('')}</div></div>
  <div class="setrow"><div class="lbl">Henkilömäärä<small>Skaalaa annokset ja ostoslistan</small></div>
    <div class="step"><button id="pMinus" aria-label="Vähennä">−</button><span class="v num">${settings.persons}</span><button id="pPlus" aria-label="Lisää">+</button></div></div>
  <div class="setrow"><div class="lbl">Lounas &amp; päivällinen<small>Yksi iso satsi molempiin, vai omat ruuat</small></div>
    <div class="seg">
      <button id="mSama" class="${settings.mainsMode==='sama'?'on':''}">Sama satsi</button>
      <button id="mEri" class="${settings.mainsMode==='erilliset'?'on':''}">Erilliset</button></div></div>
  <div class="setrow"><div class="lbl">Punainen liha<small>Vähän = korkeintaan yksi punaisen lihan pääruoka viikossa</small></div>
    <div class="seg">${[['salli','Saa olla'],['vahan','Vähän'],['ei','Ei ollenkaan']].map(([v,t])=>
      `<button data-rm="${v}" class="${settings.redMeat===v?'on':''}">${t}</button>`).join('')}</div></div>
  <div class="setrow"><div class="lbl">Ruokavalio<small>Suodattaa arvonnan ja reseptipankin</small></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${['gluteeniton','maidoton','vhh'].map(f=>
      `<button class="chip ${settings.filters.includes(f)?'on':''}" data-f="${f}">${f==='vhh'?'VHH':f[0].toUpperCase()+f.slice(1)}</button>`).join('')}</div></div>
  <div class="setrow"><div class="lbl">Pääruokien vaihteluhistoria<small>Arvonta välttää ${ROTATION_DAYS} pv sisällä syötyjä pääruokia. Aamu- ja iltapalat arvotaan vapaasti.</small></div>
    <button class="danger" id="clrHist">Tyhjennä</button></div>
  <p class="sub" style="margin-top:14px">Kaloritavoite skaalaa annoskoot ja ostoslistan heti — paras osuvuus tulee arpomalla viikko uusiksi. Punainen liha ja lounasasetus vaikuttavat seuraavaan arvontaan; henkilömäärä päivittyy heti.</p>`;
  sh.querySelectorAll('[data-kcal]').forEach(b=>b.onclick=()=>{ settings.kcalTarget=+b.dataset.kcal; saveSet() });
  sh.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ settings.redMeat=b.dataset.rm; saveSet() });
  sh.querySelector('#pMinus').onclick=()=>{ settings.persons=Math.max(1,settings.persons-1); saveSet() };
  sh.querySelector('#pPlus').onclick=()=>{ settings.persons=Math.min(6,settings.persons+1); saveSet() };
  sh.querySelector('#mSama').onclick=()=>{ settings.mainsMode='sama'; saveSet() };
  sh.querySelector('#mEri').onclick=()=>{ settings.mainsMode='erilliset'; saveSet() };
  sh.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const f=c.dataset.f,i=settings.filters.indexOf(f);
    i<0?settings.filters.push(f):settings.filters.splice(i,1); saveSet();
  });
  sh.querySelector('#clrHist').onclick=()=>{ history_={}; LS.set('history',history_); toast('Historia tyhjennetty') };
}
function saveSet(){ LS.set('settings',settings); renderSettings(); renderAll() }

/* ----- Sheet plumbing ----- */
function openSheet(sh){
  document.getElementById('scrim').classList.add('open');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.toggle('open',s===sh));
  document.body.style.overflow='hidden';
}
function closeSheets(){
  settingsOpen=false;
  document.getElementById('scrim').classList.remove('open');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'));
  document.body.style.overflow='';
}
</script>
</body>
</html>
